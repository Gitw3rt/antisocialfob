<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BIO | antisocialfob</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --card-w: 380px;
            --accent: #9ca3af;
            --accent2: #6b7280;
            --glass: rgba(10, 10, 15, 0.25);     /* ОЧЕНЬ ПРОЗРАЧНЫЙ (было 0.55, стало 0.25) */
            --glass-border: rgba(255,255,255,0.1);
            --text: #e5e7eb;
            --text-muted: rgba(229,231,235,0.6);
            --radius: 24px;
            --bg-image: url('anti.gif');         /* 👈 ФОН - anti.gif */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            cursor: none;
            background: #0a0a0a;
        }

        /* ЭКРАН ВХОДА */
        #entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            cursor: pointer;
        }

        .click-to-enter {
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #e5e7eb;
            text-transform: lowercase;
            text-shadow: 0 0 5px #6b7280, 0 0 10px #4b5563;
            animation: breathe 2s infinite ease-in-out;
            user-select: none;
            font-weight: 300;
            font-family: 'Syne Mono', monospace;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(0.98); letter-spacing: 5px; }
            50% { opacity: 1; transform: scale(1); letter-spacing: 8px; text-shadow: 0 0 15px #9ca3af, 0 0 30px #6b7280; }
        }

        /* КАСТОМНЫЙ КУРСОР */
        .custom-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            background: #e5e7eb;
            border-radius: 50%;
            pointer-events: none !important;
            z-index: 10000;
            mix-blend-mode: normal;
            box-shadow: 0 0 12px 6px rgba(229,231,235,0.3), 0 0 25px 12px rgba(107,114,128,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, opacity 0.2s, background 0.2s;
            left: -100px;
            top: -100px;
        }

        /* ФОН - ПОДДЕРЖКА GIF */
        #bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            z-index: 0;
        }

        #bg-img {
            position: fixed;
            inset: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(5px) brightness(0.4) saturate(0.9);
            transform: scale(1.05);
            z-index: 1;
            display: var(--bg-image, none);
            opacity: 0.85;
        }

        /* БЛОБЫ */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: blobFloat 8s ease-in-out infinite;
        }

        .blob1 { width: 450px; height: 450px; background: rgba(156,163,175,0.1); top: -120px; left: -120px; }
        .blob2 { width: 350px; height: 350px; background: rgba(107,114,128,0.08); bottom: -100px; right: -100px; animation-delay: -2s; }
        .blob3 { width: 280px; height: 280px; background: rgba(75,85,99,0.1); top: 40%; left: 20%; animation-delay: -4s; }
        .blob4 { width: 220px; height: 220px; background: rgba(156,163,175,0.06); top: 15%; right: 5%; animation-delay: -1s; }
        .blob5 { width: 380px; height: 380px; background: rgba(107,114,128,0.05); bottom: 5%; left: 15%; animation-delay: -6s; }
        .blob6 { width: 180px; height: 180px; background: rgba(156,163,175,0.08); top: 70%; right: 15%; animation-delay: -3s; }
        .blob7 { width: 300px; height: 300px; background: rgba(75,85,99,0.04); bottom: 40%; left: -50px; animation-delay: -5s; }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(25px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* КАРТОЧКА - ПРАКТИЧЕСКИ ПРОЗРАЧНАЯ */
        #card-scene {
            position: relative;
            z-index: 10;
            perspective: 1000px;
            perspective-origin: 50% 50%;
        }

        #card {
            width: var(--card-w);
            border-radius: var(--radius);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px) saturate(1.05);
            -webkit-backdrop-filter: blur(12px) saturate(1.05);
            padding: 2rem 1.8rem 1.8rem;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
            transition: box-shadow .15s ease;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03) inset;
            will-change: transform;
            position: relative;
            overflow: hidden;
            animation: borderGlow 4s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
            50% { border-color: rgba(156,163,175,0.25); box-shadow: 0 35px 70px rgba(0,0,0,0.4), 0 0 15px rgba(156,163,175,0.1); }
        }

        #card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        #card-shine {
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity .3s;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 65%);
        }

        #card:hover #card-shine {
            opacity: 1;
        }

        /* АВАТАР */
        .avatar-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1.3rem;
            position: relative;
            z-index: 2;
        }

        .avatar-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #9ca3af, #6b7280);
            position: relative;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(20,20,25,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0,0,0,0.5);
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* КРАСНЫЙ СТАТУС */
        .status-dnd {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ed4245;
            border: 3px solid rgba(10,10,10,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px rgba(237,66,69,0.6);
            animation: pulse-red 2s ease infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 6px rgba(237,66,69,0.5); transform: scale(1); }
            50% { box-shadow: 0 0 14px rgba(237,66,69,0.9); transform: scale(1.05); }
        }

        .status-dnd::before {
            content: "−";
            font-size: 14px;
            font-weight: bold;
            color: white;
            line-height: 1;
            margin-top: -2px;
        }

        /* ТЕКСТ */
        .identity { text-align: center; margin-bottom: 1rem; position: relative; z-index: 2; }
        .nick { font-size: 1.35rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; margin-bottom: .25rem; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .role-tag { display: inline-block; font-family: 'Syne Mono', monospace; font-size: .65rem; letter-spacing: .15em; color: #9ca3af; background: rgba(156,163,175,0.15); border: 1px solid rgba(156,163,175,0.3); padding: .25rem .75rem; border-radius: 50px; text-transform: uppercase; backdrop-filter: blur(4px); }
        .bio { font-size: .78rem; color: var(--text-muted); line-height: 1.7; text-align: center; margin-bottom: 1.2rem; padding: 0 .3rem; text-shadow: 0 0 3px rgba(0,0,0,0.3); }

        /* ПЛЕЕР */
        .player-container {
            margin: 0.5rem 0 1rem 0;
            padding: 0.8rem;
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .player-container:hover {
            background: rgba(0,0,0,0.35);
            border-color: rgba(156,163,175,0.2);
        }

        .player-track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .track-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-cover-placeholder {
            font-size: 24px;
        }

        .track-details {
            flex: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.65rem;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* ПОЛОСА ПРОГРЕССА */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            margin: 8px 0 6px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9ca3af, #6b7280);
            border-radius: 4px;
            position: relative;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.55rem;
            color: #9ca3af;
            font-family: 'Syne Mono', monospace;
            margin-bottom: 8px;
        }

        /* КНОПКИ ПЛЕЕРА */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 8px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #e5e7eb;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 50%;
        }

        .control-btn:hover {
            transform: scale(1.1);
            color: #9ca3af;
            background: rgba(255,255,255,0.08);
        }

        .play-pause-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(156,163,175,0.2);
            border: 1px solid rgba(156,163,175,0.3);
        }

        .play-pause-btn:hover {
            background: rgba(156,163,175,0.3);
            transform: scale(1.05);
        }

        /* РЕГУЛИРОВКА ГРОМКОСТИ */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .volume-icon {
            color: #9ca3af;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
        }

        .volume-icon:hover {
            color: #e5e7eb;
        }

        .volume-slider {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9ca3af;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #e5e7eb;
        }

        /* РАЗДЕЛИТЕЛЬ */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 0.8rem 0 1rem 0;
        }

        .apps-label {
            font-family: 'Syne Mono', monospace;
            font-size: .58rem;
            letter-spacing: .2em;
            color: rgba(229,231,235,0.4);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 0.8rem;
        }

        /* ССЫЛКИ */
        .apps-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: .6rem;
        }

        .app-chip {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .45rem .9rem;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50px;
            text-decoration: none;
            font-size: .7rem;
            color: var(--text);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .app-chip:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(0,0,0,0.5);
            border-color: rgba(156,163,175,0.4);
        }

        /* ЧАСТИЦЫ */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: particleDrift linear infinite;
            opacity: 0;
        }

        @keyframes particleDrift {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(var(--dx)); opacity: 0; }
        }

        /* ЗВЕЗДЫ */
        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #9ca3af;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.8); }
        }
    </style>
</head>

    <script>
        lucide.createIcons();

        // ЭКРАН ВХОДА
        const entryScreen = document.getElementById('entry-screen');
        entryScreen.addEventListener('click', () => {
            entryScreen.style.opacity = '0';
            setTimeout(() => {
                entryScreen.style.visibility = 'hidden';
                entryScreen.style.display = 'none';
                audio.play().catch(e => console.log('Audio play blocked'));
            }, 800);
        });

        // КАСТОМНЫЙ КУРСОР
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
            cursor.style.background = '#9ca3af';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.background = '#e5e7eb';
        });
        
        const clickables = document.querySelectorAll('a, button, .app-chip');
        clickables.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '32px';
                cursor.style.height = '32px';
                cursor.style.boxShadow = '0 0 20px 10px rgba(156,163,175,0.5)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '24px';
                cursor.style.height = '24px';
                cursor.style.boxShadow = '0 0 12px 6px rgba(229,231,235,0.3)';
            });
        });
        document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
        document.addEventListener('mouseenter', () => { cursor.style.opacity = '1'; });

        // ========== АУДИОПЛЕЕР ==========
        const audioUrl = "ezz.mp3";
        
        let audio = new Audio(audioUrl);
        let isPlaying = false;
        let totalDuration = 196;
        
        audio.loop = false;
        audio.volume = 0.7;
        
        // РЕГУЛИРОВКА ГРОМКОСТИ
        const volumeSlider = document.getElementById('volume-slider');
        const volumeIcon = document.getElementById('volume-icon');
        
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
            // Меняем иконку в зависимости от громкости
            if (audio.volume === 0) {
                volumeIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="21" y2="21"></line><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>';
            } else if (audio.volume < 0.3) {
                volumeIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="9" y1="12" x2="15" y2="12"></line></svg>';
            } else {
                volumeIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';
            }
        });
        
        // Клик по иконке для mute/unmute
        volumeIcon.addEventListener('click', () => {
            if (audio.volume > 0) {
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="21" y2="21"></line><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>';
            } else {
                audio.volume = 0.7;
                volumeSlider.value = 0.7;
                volumeIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';
            }
        });
        
        audio.addEventListener('loadedmetadata', () => {
            if (audio.duration && !isNaN(audio.duration)) {
                totalDuration = audio.duration;
                document.getElementById('duration').innerText = formatTime(totalDuration);
            }
        });
        
        setTimeout(() => {
            if (!audio.duration || isNaN(audio.duration)) {
                totalDuration = 196;
                document.getElementById('duration').innerText = "03:16";
            }
        }, 1000);
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function updateProgress() {
            if (audio.duration && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-fill').style.width = `${percent}%`;
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            } else if (isPlaying) {
                if (audio.currentTime < totalDuration) {
                    audio.currentTime += 0.1;
                    const percent = (audio.currentTime / totalDuration) * 100;
                    document.getElementById('progress-fill').style.width = `${percent}%`;
                    document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                    if (audio.currentTime >= totalDuration) {
                        audio.pause();
                        isPlaying = false;
                        updatePlayPauseIcon();
                    }
                }
            }
            requestAnimationFrame(updateProgress);
        }
        
        function updatePlayPauseIcon() {
            const icon = document.getElementById('play-pause-icon');
            if (isPlaying) {
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/>';
            } else {
                icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>';
            }
        }
        
        const playPauseBtn = document.getElementById('play-pause-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play().catch(e => console.log('Playback error:', e));
                isPlaying = true;
            }
            updatePlayPauseIcon();
        });
        
        prevBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        
        nextBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration || totalDuration, audio.currentTime + 10);
        });
        
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration && !isNaN(audio.duration)) {
                audio.currentTime = percent * audio.duration;
            } else {
                audio.currentTime = percent * totalDuration;
            }
        });
        
        audio.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayPauseIcon();
            audio.currentTime = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('current-time').innerText = '00:00';
        });
        
        updateProgress();
        
        // ОБЛОЖКА ТРЕКА
        const coverImg = document.getElementById('cover-img');
        const coverPlaceholder = document.querySelector('.track-cover-placeholder');
        if (coverImg) {
            coverImg.onerror = function() {
                this.style.display = 'none';
                if (coverPlaceholder) coverPlaceholder.style.display = 'flex';
            };
        }
        
        // ФОНОВОЕ ИЗОБРАЖЕНИЕ (GIF)
        (function() {
            const bgImgDiv = document.getElementById('bg-img');
            const bgImageVar = getComputedStyle(document.documentElement).getPropertyValue('--bg-image').trim();
            if (bgImageVar && bgImageVar !== 'none') {
                bgImgDiv.style.backgroundImage = bgImageVar;
                bgImgDiv.style.display = 'block';
            }
        }());
        
        // 3D ЭФФЕКТ
        const card = document.getElementById('card');
        const shine = document.getElementById('card-shine');
        let targetRotateX = 0, targetRotateY = 0;
        let currentRotateX = 0, currentRotateY = 0;
        const maxTilt = 18;
        
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            targetRotateY = ((e.clientX - centerX) / (window.innerWidth / 2)) * maxTilt;
            targetRotateX = -((e.clientY - centerY) / (window.innerHeight / 2)) * maxTilt;
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;
            shine.style.background = `radial-gradient(circle at ${xPercent}% ${yPercent}%, rgba(255,255,255,0.08) 0%, transparent 60%)`;
        });
        
        document.addEventListener('mouseleave', () => { targetRotateX = 0; targetRotateY = 0; });
        
        function animateTilt() {
            currentRotateX = currentRotateX + (targetRotateX - currentRotateX) * 0.08;
            currentRotateY = currentRotateY + (targetRotateY - currentRotateY) * 0.08;
            card.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
            requestAnimationFrame(animateTilt);
        }
        animateTilt();
        
        // ЧАСТИЦЫ
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 70; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 1;
            particle.style.cssText = `
                left: ${Math.random() * 100}%;
                bottom: -10px;
                width: ${size}px;
                height: ${size}px;
                --dx: ${(Math.random() - 0.5) * 160}px;
                animation-duration: ${Math.random() * 20 + 8}s;
                animation-delay: ${Math.random() * 15}s;
                opacity: ${Math.random() * 0.6};
                background: ${Math.random() > 0.5 ? '#9ca3af' : '#6b7280'};
            `;
            particlesContainer.appendChild(particle);
        }
        
        // ЗВЕЗДЫ
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${Math.random() * 3 + 1}px;
                height: ${Math.random() * 3 + 1}px;
                animation-duration: ${Math.random() * 4 + 2}s;
                animation-delay: ${Math.random() * 6}s;
                background: ${Math.random() > 0.8 ? '#e5e7eb' : '#9ca3af'};
            `;
            starsContainer.appendChild(star);
        }
        
        // ТАЧ-СОБЫТИЯ
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            targetRotateY = ((touch.clientX - centerX) / centerX) * maxTilt;
            targetRotateX = -((touch.clientY - centerY) / centerY) * maxTilt;
        }, { passive: true });
        document.addEventListener('touchend', () => { targetRotateX = 0; targetRotateY = 0; });
    </script>
</body>
</html>
